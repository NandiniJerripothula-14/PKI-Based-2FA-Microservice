services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pki-2fa-service
    ports:
      - "8081:8080"
    environment:
      TZ: UTC
      DATA_DIR: /data
      STUDENT_PRIVATE_KEY_PATH: /app/student_private.pem
      INSTRUCTOR_PUBLIC_KEY_PATH: /app/instructor_public.pem
    volumes:
      - seed-data:/data
      - cron-output:/cron
    restart: unless-stopped

volumes:
  seed-data:
  cron-output: